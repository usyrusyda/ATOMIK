<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro Video - Ikatan Kimia ✨</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #ffc107;
      --batik-blue: #3a7caf;
      --cream: #fffdf2;
      --red-accent: #ff6b6b;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      margin: 0;
      background-color: var(--cream);
      color: var(--batik-blue);
      overflow-x: hidden;
    }
    h1, h2, h3, h4 { font-family: 'Fredoka', sans-serif; margin-bottom: 10px; }

    /* BACKGROUND */
    .bg-mascot-decor { position: fixed; z-index: -1; opacity: 0.08; pointer-events: none; }
    #bg-1 { width: 350px; top: -50px; left: -80px; animation: float 10s infinite; }
    #bg-2 { width: 250px; bottom: 20px; right: -40px; animation: float 8s infinite reverse; }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-30px) rotate(8deg); } }

    button {
      padding: 12px 20px; background: var(--batik-blue); color: white;
      border: none; border-radius: 50px; font-family: 'Fredoka', sans-serif;
      font-size: 15px; cursor: pointer; box-shadow: 0 5px 0 #2a5a82;
      transition: 0.2s; position: relative; display: inline-block; margin: 5px;
    }
    button:hover { background: #4a8cbf; top: -2px; box-shadow: 0 7px 0 #2a5a82; }
    button:active { top: 3px; box-shadow: 0 2px 0 #2a5a82; }

    .btn-back { background: #b2bec3; box-shadow: 0 5px 0 #636e72; }
    .wrap {
      padding: 40px 5%;
      text-align: center;
    }
    .video-box {
      max-width: 800px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 30px;
      border: 8px solid var(--gold);
    }
  </style>
</head>

<body onload="guardLogin()">
  <img src="maskot.png" class="bg-mascot-decor" id="bg-1">
  <img src="maskot.png" class="bg-mascot-decor" id="bg-2">

  <div class="wrap">
    <button class="btn-back" onclick="goBack()">⬅️ Kembali</button>

    <div class="video-box">
      <video id="intro-video" style="width:100%; border-radius:15px;" controls>
        <source src="video.mp4" type="video/mp4">
      </video>
    </div>

    <button onclick="skipToMenu()">Lanjut ke Menu ➡️</button>
  </div>

  <script>
    function guardLogin() {
      const u = localStorage.getItem("kimia_user");
      if (!u) window.location.href = "index.html";
    }

    function goBack() {
      // balik ke landing
      window.location.href = "index.html";
    }

    function skipToMenu() {
      const vid = document.getElementById('intro-video');
      if (vid) vid.pause();
      window.location.href = "menu.html";
    }
  </script>
</body>
</html>
